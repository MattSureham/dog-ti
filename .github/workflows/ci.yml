name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 test_quiz.py

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check JS syntax via node
        run: |
          node --check index.html 2>&1 || true
          # Basic structural checks
          python3 -c "
          with open('index.html') as f:
              html = f.read()
          checks = []
          if html.count('<script>') != html.count('</script>'):
              checks.append('script tag mismatch')
          if html.count('<head>') != html.count('</head>'):
              checks.append('head tag mismatch')
          if 'function setLang' not in html:
              checks.append('setLang function missing')
          if 'enQuestions' not in html:
              checks.append('English questions missing')
          if checks:
              print('FAIL:', checks)
              exit(1)
          else:
              print('OK: all checks passed')
          "
