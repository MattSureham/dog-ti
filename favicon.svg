  <rect x="8" y="26" width="2" height="4" fill="#111111"/>
  <rect x="10" y="26" width="2" height="4" fill="#111111"/>
  <rect x="12" y="26" width="2" height="4" fill="#111111"/>
  <rect x="16" y="26" width="2" height="4" fill="#111111"/>
  <rect x="18" y="26" width="2" height="4" fill="#111111"/>
